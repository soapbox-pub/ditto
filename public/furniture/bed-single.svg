<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120">
  <!-- 1. Sombra no chão -->
  <!-- <ellipse cx="80" cy="100" rx="70" ry="15" fill="#000" opacity="0.1" /> -->

  <!-- 2. Base/Borda Externa (O "Donut" Marrom) -->
  <ellipse cx="80" cy="70" rx="75" ry="35" fill="#6d4c41" stroke="#4e342e" stroke-width="2"/>

  <!-- 3. Detalhes de "Gomos" -->
  <g stroke="#4e342e" stroke-width="1" opacity="0.3" fill="none">
    <path d="M30 55 Q20 70 30 85" />
    <path d="M55 42 Q50 70 55 98" />
    <path d="M80 35 L80 105" />
    <path d="M105 42 Q110 70 105 98" />
    <path d="M130 55 Q140 70 130 85" />
  </g>

  <!-- 4. Almofada Interna (Parte clara) -->
  <ellipse cx="80" cy="70" rx="55" ry="22" fill="#d7ccc8" stroke="#a1887f" stroke-width="1"/>

  <!-- 5. Brilho de Volume Central (Elipse branca) -->
  <ellipse cx="80" cy="70" rx="35" ry="12" fill="#ffffff" opacity="0.5" />

  <!-- 6. Etiqueta Frontal -->
  <rect x="70" y="92" width="20" height="8" rx="2" fill="#a1887f" />

  <!-- 7. Patinhas Decorativas (Ajustadas para os extremos laterais) -->
  <g fill="#ffffff" opacity="0.5">
    <!-- Patinha Esquerda (cx="15") -->
    <circle cx="15" cy="80" r="4" /> 
    <circle cx="10" cy="74" r="2" /> <circle cx="15" cy="71" r="2" /> <circle cx="20" cy="74" r="2" />
    
    <!-- Patinha Direita (cx="145") -->
    <circle cx="145" cy="80" r="4" /> 
    <circle cx="140" cy="74" r="2" /> <circle cx="145" cy="71" r="2" /> <circle cx="150" cy="74" r="2" />
  </g>
</svg>
