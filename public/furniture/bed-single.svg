<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120">
  <!-- 1. Sombra integrada seguindo a base da cama -->
  <ellipse cx="80" cy="100" rx="68" ry="7" fill="#000" opacity="0.12" />

