<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 115" fill="none">
  <!-- Cute alarm clock - pink with bells -->
  <!-- Alarm bells -->
  <circle cx="25" cy="12" r="10" fill="#ff8fa8"/>
  <circle cx="75" cy="12" r="10" fill="#ff8fa8"/>
  <!-- Bell connector -->
  <rect x="45" y="2" width="10" height="5" rx="2.5" fill="#cc3355"/>
  <!-- Face -->
  <circle cx="50" cy="50" r="45" fill="#ffe8ec" stroke="#ff6b8a" stroke-width="3"/>
  <!-- Dot markers -->
  <circle cx="50" cy="16" r="2.5" fill="#ff6b8a"/>
  <circle cx="50" cy="84" r="2.5" fill="#ff6b8a"/>
  <circle cx="84" cy="50" r="2.5" fill="#ff6b8a"/>
  <circle cx="16" cy="50" r="2.5" fill="#ff6b8a"/>
  <!-- Hour hand pointing ~10 -->
  <line x1="50" y1="50" x2="40" y2="35" stroke="#cc3355" stroke-width="3" stroke-linecap="round"/>
  <!-- Minute hand pointing ~2 (10:10) -->
  <line x1="50" y1="50" x2="63" y2="28" stroke="#cc3355" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="50" cy="50" r="3" fill="#cc3355"/>
  <!-- Feet -->
  <rect x="32" y="98" width="5" height="12" rx="2" fill="#ff6b8a" transform="rotate(-10 34.5 104)"/>
  <rect x="63" y="98" width="5" height="12" rx="2" fill="#ff6b8a" transform="rotate(10 65.5 104)"/>
</svg>
