<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 60" fill="none">
  <!-- Bedside digital clock -->
  <!-- Case body -->
  <rect x="4" y="8" width="112" height="44" rx="6" fill="#1a1a2e" stroke="#333355" stroke-width="2"/>
  <!-- Screen area -->
  <rect x="12" y="14" width="96" height="32" rx="3" fill="#0a0a18"/>
  <!-- Time display 10:10 -->
  <text x="60" y="38" text-anchor="middle" dominant-baseline="middle" fill="#44ff88" font-size="22" font-family="monospace" font-weight="bold">10:10</text>
  <!-- Small LED indicator -->
  <circle cx="100" cy="20" r="2" fill="#44ff88" opacity="0.6"/>
</svg>
