  <!-- Right arm -->
  <rect x="32" y="35" width="8" height="14" rx="4" fill="#4a8c3f"/>
  <!-- Spines (subtle dots) -->
  <g fill="#2d6b28" opacity="0.5">
    <circle cx="25" cy="32" r="1"/>
    <circle cx="25" cy="40" r="1"/>
    <circle cx="25" cy="48" r="1"/>
    <circle cx="25" cy="56" r="1"/>
    <circle cx="25" cy="64" r="1"/>
  </g>
  <!-- Flower on top -->
  <circle cx="25" cy="23" r="4" fill="#f0a0c0"/>
  <circle cx="25" cy="23" r="2" fill="#ffcc00"/>
</svg>
