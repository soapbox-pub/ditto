<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 100" fill="none">
  <!-- Pot -->
  <path d="M12 100 L15 72 H35 L38 100 Z" fill="#c2703a"/>
  <rect x="10" y="70" width="30" height="5" rx="2" fill="#a05828"/>
  <!-- Main cactus body -->
  <rect x="18" y="25" width="14" height="47" rx="7" fill="#5a9e4b"/>
  <!-- Left arm -->
  <path d="M18 45 H12 V35 Q12 28 18 28" fill="#4a8c3f"/>
