repository: https://gitlab.com/soapbox-pub/ditto

name: Ditto

summary: Your content. Your vibe. Your rules.

description: |
  Ditto is an open-source Nostr client. Your content. Your vibe. Your rules,
  and all the other stuff: games, treasure hunts, magic decks, live streams,
  color moments, and more.

  Features:
  - Theming — 9 built-in presets, shareable themes
  - Infinite content types — notes, articles, short videos (Vines), live streams,
    polls, follow packs, color moments, magic decks, geocaching, Webxdc mini-apps
  - Lightning payments — zap posts and profiles via NWC or WebLN
  - Comments on anything — posts, URLs, profiles, hashtags, books, and more

tags:
  - nostr
  - social
  - messaging
  - lightning
  - decentralized

license: AGPL-3.0

